# .github/workflows/risk-scanner.yml

name: RiskAI Scanner

on:
  schedule:
    - cron: '45 3 * * 1-5'   # 9:15 AM IST — market open
    - cron: '0 10 * * 1-5'   # 3:30 PM IST — market close
  workflow_dispatch:           # manual trigger from GitHub UI for testing

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run scanner
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          cd backend
          python scanner.py
